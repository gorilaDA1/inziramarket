<style>
:root{--green-deep:#1B4332;--green-mid:#2D6A4F;--green-light:#52B788;--gold:#D4A017;--gold-light:#F0C040;--red:#E63946;--cream:#FDF8F0;--cream2:#F5EFE0;--charcoal:#1A1A2E;--grey:#6B7280;--white:#FFFFFF;--ff-d:'Playfair Display',Georgia,serif;--ff-b:'DM Sans',system-ui,sans-serif;--ff-m:'DM Mono',monospace;--ease:.35s cubic-bezier(.22,1,.36,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--ff-b);background:var(--cream);color:var(--charcoal);overflow-x:hidden}
::selection{background:var(--green-light);color:var(--white)}
img{max-width:100%;display:block}
button{font-family:inherit;border:none;outline:none;background:none;cursor:pointer}
a{text-decoration:none;color:inherit;cursor:pointer}
input,select{font-family:inherit;outline:none}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cream2)}
::-webkit-scrollbar-thumb{background:var(--green-mid);border-radius:3px}

/* Scroll Progress */
#scrollProg{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--green-mid),var(--gold));z-index:10000;width:0;transition:none}

/* ADVANCED PREMIUM LOADER */
#loader{position:fixed;inset:0;background:#06060A;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s, visibility .8s;overflow:hidden}
#loader.done{opacity:0;visibility:hidden}

.p-container{position:absolute;inset:0;pointer-events:none;z-index:1}
.particle{position:absolute;background:white;border-radius:50%;opacity:0;animation:floatParticle 4s ease-in-out infinite}

#loader .l-wrap{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;transform:translateY(-10px)}
#loader .flag{font-size:.6rem;color:var(--gold);opacity:0;margin-bottom:2rem;font-family:var(--ff-m);letter-spacing:6px;text-transform:uppercase;animation:fadeReveal .5s .1s forwards}

#loader .logo-svg{width:260px;height:auto;overflow:visible}
#loader .logo-circle{stroke-dasharray:240;stroke-dashoffset:240;animation:strokeDraw 0.8s 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards, pulse-glow 2s 1s ease-in-out infinite;stroke:var(--gold);stroke-width:1.2}
#loader .logo-path{opacity:0;fill:var(--white);transform:scale(0.8);transform-origin:center;animation:scalePop 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards}

/* Letter Spans */
.l-char{display:inline-block;opacity:0;filter:blur(10px);transform:translateY(10px);animation:charReveal 0.4s forwards;fill:var(--white)}

#loader .tag{font-family:var(--ff-b);color:rgba(255,255,255,0.4);font-size:.65rem;letter-spacing:4px;text-transform:uppercase;opacity:0;margin-top:1.8rem;animation:fadeReveal 0.5s 0.8s forwards}
#loader .progress-container{position:absolute;bottom:0;left:0;width:100%;height:1px;background:rgba(255,255,255,0.03)}
#loader .progress-bar{height:100%;width:0;background:var(--gold);transition:width 0.4s cubic-bezier(0.1, 0.5, 0.5, 1);box-shadow:0 0 10px var(--gold)}
#loader .pct{position:absolute;bottom:50px;font-family:var(--ff-m);color:rgba(255,255,255,0.25);font-size:.6rem;letter-spacing:3px;opacity:0;animation:fadeIn .5s 0.5s forwards}

@keyframes floatParticle{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:0.4}80%{opacity:0.4}100%{opacity:0;transform:translateY(-100px) scale(1)}}
@keyframes charReveal{to{opacity:1;filter:blur(0);transform:translateY(0)}}
@keyframes pulse-glow{0%,100%{stroke-opacity:1;stroke-width:1.2}50%{stroke-opacity:0.5;stroke-width:2;filter:drop-shadow(0 0 5px var(--gold))}}

@keyframes fadeReveal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes strokeDraw{to{stroke-dashoffset:0}}
@keyframes scalePop{to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{to{opacity:1}}


/* Cinematic bars */
.cbar{position:fixed;left:0;right:0;height:60px;background:var(--charcoal);z-index:9998;transition:transform .8s var(--ease) .1s}
.cbar-t{top:0}.cbar-b{bottom:0}
.cbar.hide-t{transform:translateY(-100%)}.cbar.hide-b{transform:translateY(100%)}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:9990;padding:0 3%;height:64px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(253,248,240,.82);transition:background .3s,box-shadow .3s}
#nav.scrolled{background:rgba(253,248,240,.97);box-shadow:0 1px 12px rgba(0,0,0,.06)}
#nav .logo{height:42px;display:flex;align-items:center;overflow:visible;transition:transform .3s var(--ease)}
#nav .logo:hover{transform:scale(1.02)}
#nav .logo svg{height:100%;width:auto;display:block}
.logo-white{filter:brightness(0) invert(1)}
.logo-tagline{font-family:var(--ff-b);font-size:7px;font-weight:600;letter-spacing:4px;color:var(--grey);text-transform:uppercase;margin-top:-2px;opacity:0.8}
#nav .links{display:flex;gap:1.8rem;align-items:center}
#nav .links a{font-size:.85rem;font-weight:500;color:var(--charcoal);position:relative;padding:4px 0}
#nav .links a::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1.5px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform var(--ease)}
#nav .links a:hover::after{transform:scaleX(1)}
#nav .acts{display:flex;gap:1.4rem;align-items:center}
#nav .acts button:not(.btn-g):not(.btn-p){font-size:1.05rem;position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(45,106,79,0.06);color:var(--green-mid);transition:all var(--ease);border:1px solid rgba(45,106,79,0.1);padding:0}
#nav .acts button:not(.btn-g):not(.btn-p):hover{background:var(--green-mid);color:#fff}
.acts button .svg-ic{width:18px;height:18px}
.badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:.55rem;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--ff-m);animation:popIn .3s;border:1.5px solid var(--cream)}
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.btn-p{background:var(--green-mid);color:#fff;height:28px;padding:0 14px;border-radius:50px;font-size:.65rem;font-weight:600;display:inline-flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 2px 8px rgba(0,0,0,.05);border:none}
.btn-p:hover{background:var(--green-deep);transform:translateY(-3px) scale(1.02);box-shadow:0 6px 15px rgba(27,67,50,0.2)}
.btn-p:active{transform:translateY(-1px) scale(.98)}

.btn-g{border:1.5px solid var(--green-mid);color:var(--green-mid);height:28px;padding:0 14px;border-radius:50px;font-size:.65rem;font-weight:600;display:inline-flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);margin-left:0.5rem}
.btn-g:hover{background:var(--green-mid);color:#fff;transform:translateY(-3px) scale(1.02);box-shadow:0 6px 15px rgba(45,106,79,0.15)}
.btn-g:active{transform:translateY(-1px) scale(.98)}
#hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:10}
#hamburger span{width:22px;height:2px;background:var(--charcoal);transition:var(--ease)}

/* Mobile nav drawer */
#drawer{position:fixed;top:0;right:-100%;width:300px;height:100vh;background:var(--cream);z-index:9991;padding:80px 2rem 2rem;transition:right .4s var(--ease);box-shadow:-4px 0 20px rgba(0,0,0,.08)}
#drawer.open{right:0}
#drawer a{display:block;padding:12px 0;font-size:1.1rem;font-weight:500;border-bottom:1px solid var(--cream2)}
#drawer .drawer-acts{margin-top:1.5rem;display:flex;flex-direction:column;gap:1.1rem}
#drawer .btn-p,#drawer .btn-g{display:block;text-align:center;padding:10px;font-size:.85rem;width:100%}
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:9989;opacity:0;pointer-events:none;transition:opacity .3s}
#drawer-overlay.open{opacity:1;pointer-events:all}

/* SPLIT TEXT */
.split-txt{overflow:hidden;display:inline-block}
.split-char{display:inline-block;transform:translateY(100%);transition:transform .8s var(--ease)}
.show .split-char{transform:translateY(0)}

/* STAGGERED REVEAL */
.rev{opacity:0;transform:translateY(30px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.rev.show{opacity:1;transform:translateY(0)}
.rev.stagger-parent > *{opacity:0;transform:translateY(20px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.rev.show.stagger-parent > *{opacity:1;transform:translateY(0)}

/* GRID STAGGER */
.pgrid > .pcard:nth-child(n){transition-delay:calc(0.05s * var(--i, 0))}

/* CARD HOVER */
.pcard{background:var(--white);border-radius:12px;overflow:hidden;position:relative;transition:transform .4s var(--ease),box-shadow .4s var(--ease);border:1px solid rgba(0,0,0,.03)}
.pcard:hover{transform:translateY(-8px);box-shadow:0 12px 30px rgba(27,67,50,.08)}
.pcard-img{height:200px;background:var(--cream2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pimg{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.pcard:hover .pimg{transform:scale(1.1)}

/* SVG ICONS */
.svg-ic{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}
.acts button .svg-ic{width:18px;height:18px}

/* FLOATING LABELS */
.float-label{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:8px 16px;border-radius:30px;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 15px rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.05)}
</style>
