<style>
/* HERO */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:100px 5% 60px;background:var(--cream)}
#hero::before{content:'';position:absolute;inset:0;background:rgba(253,248,240,0.65);z-index:1}
#hero canvas{position:absolute;inset:0;z-index:2}
.hero-vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero-c{position:relative;z-index:3;text-align:center;max-width:820px}
.trust-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(45,106,79,.1);border:1px solid rgba(45,106,79,.2);padding:6px 16px;border-radius:50px;font-size:.75rem;font-weight:600;color:var(--green-mid);margin-bottom:1.5rem}
.hero-h1{font-family:var(--ff-d);font-size:clamp(2.4rem,5.5vw,4.2rem);line-height:1.15;color:var(--charcoal);margin-bottom:1rem}
.hero-h1 em{color:var(--gold);font-style:italic}
.hero-h1 .char{display:inline-block;opacity:0;transform:translateY(55px) rotateX(-40deg);animation:charIn .7s cubic-bezier(.22,1,.36,1) forwards}
@keyframes charIn{to{opacity:1;transform:translateY(0) rotateX(0)}}
.hero-sub{font-size:clamp(.9rem,1.8vw,1.1rem);color:var(--grey);max-width:540px;margin:0 auto 2rem;line-height:1.7}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem}
.hero-btns .btn-p{padding:12px 32px;font-size:.9rem;border-radius:8px}
.hero-btns .btn-g{padding:12px 32px;font-size:.9rem;border-radius:8px}
.stats-bar{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;padding:1.2rem 0;border-top:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06)}
.stat-item{text-align:center}
.stat-num{font-family:var(--ff-d);font-size:1.6rem;font-weight:700;color:var(--green-deep)}
.stat-lab{font-size:.7rem;color:var(--grey);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.scroll-ind{margin-top:2rem;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.5}
.scroll-ind span{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--grey)}
.scroll-ind .line{width:1px;height:30px;background:var(--charcoal);animation:shrinkLine 1.5s infinite}
@keyframes shrinkLine{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.3)}}

/* Floating labels */
.float-label{position:absolute;z-index:4;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:8px 14px;border-radius:8px;font-size:.7rem;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:floatY 6s ease-in-out infinite}
.fl-1{top:18%;left:8%}.fl-2{top:22%;right:8%}.fl-3{bottom:22%;left:10%}.fl-4{bottom:18%;right:10%}
.fl-2{animation-delay:1.5s}.fl-3{animation-delay:3s}.fl-4{animation-delay:4.5s}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* TICKER */
.ticker-wrap{background:var(--green-deep);padding:14px 0;overflow:hidden;position:relative}
.ticker{display:flex;gap:0;animation:tickScroll 25s linear infinite;width:max-content}
.ticker:hover{animation-play-state:paused}
.ticker-item{flex-shrink:0;padding:6px 24px;color:var(--cream);font-size:.8rem;font-weight:500;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}

@keyframes tickScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* SECTION COMMON */
.sec{padding:80px 5%}
.sec-h{text-align:center;margin-bottom:3rem}
.sec-h h2{font-family:var(--ff-d);font-size:clamp(1.8rem,3.5vw,2.6rem);color:var(--charcoal);margin-bottom:.6rem}
.sec-h p{color:var(--grey);max-width:520px;margin:0 auto;font-size:.95rem;line-height:1.6}
.sec-h .line{width:50px;height:3px;background:linear-gradient(90deg,var(--green-mid),var(--gold));margin:1rem auto 0;border-radius:2px}

/* FILTER + SORT */
.shop-controls{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
.filter-pills{display:flex;gap:.5rem;flex-wrap:wrap}
.fpill{padding:7px 18px;border-radius:50px;font-size:.78rem;font-weight:600;background:var(--cream2);color:var(--charcoal);border:1px solid transparent;transition:all var(--ease);cursor:pointer}
.fpill.active,.fpill:hover{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.sort-sel{padding:8px 14px;border-radius:8px;border:1px solid var(--cream2);font-size:.8rem;background:var(--white);cursor:pointer}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.4rem}
.pcard{background:var(--white);border-radius:12px;overflow:hidden;transition:transform var(--ease),box-shadow var(--ease);position:relative}
.pcard:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,.1)}
.pcard-img{height:200px;display:flex;align-items:center;justify-content:center;background:var(--cream2);font-size:1.2rem;position:relative;overflow:hidden;transition:var(--ease);text-align:center;padding:1rem;color:var(--grey)}
.pcard:hover .pcard-img .emoji{transform:scale(1.08)}
.pcard-img .emoji{transition:transform var(--ease)}
.pcard-img .qv{position:absolute;bottom:10px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--charcoal);color:#fff;font-size:.7rem;padding:6px 14px;border-radius:6px;transition:all var(--ease);pointer-events:none}
.pcard:hover .pcard-img .qv{opacity:1;transform:translateX(-50%) translateY(0)}
.pcard-wish{position:absolute;top:10px;right:10px;z-index:3;width:30px;height:30px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:var(--ease);cursor:pointer}
.pcard-wish.liked{color:var(--red)}
.pcard-badge{position:absolute;top:10px;left:10px;z-index:3;padding:3px 10px;border-radius:4px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pcard-badge.verified{background:rgba(82,183,136,.15);color:var(--green-mid)}
.pcard-badge.new{background:rgba(240,192,64,.2);color:var(--gold)}
.pcard-badge.top{background:rgba(230,57,70,.1);color:var(--red)}
.pcard-body{padding:14px 16px 16px}
.pcard-cat{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:4px}
.pcard-name{font-family:var(--ff-d);font-size:1rem;font-weight:600;margin-bottom:4px;line-height:1.3}
.pcard-seller{font-size:.72rem;color:var(--grey);margin-bottom:6px}
.pcard-stars{color:var(--gold);font-size:.7rem;margin-bottom:6px}
.pcard-stars span{color:var(--grey);font-size:.68rem}
.pcard-bottom{display:flex;justify-content:space-between;align-items:center}
.pcard-price{font-family:var(--ff-d);font-size:1.15rem;font-weight:700;color:var(--green-deep)}
.pcard-add{width:36px;height:36px;background:var(--green-mid);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all var(--ease);cursor:pointer}
.pcard-add:hover{background:var(--green-deep);transform:scale(1.1)}
</style>
