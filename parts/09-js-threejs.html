<script>
// --- THREE.JS SCENE ---
let scene,camera,renderer,threeObjects=[],scrollY=0,heroVisible=true;

function initThree(){
  const canvas=document.getElementById('heroCanvas');
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0xFDF8F0,0.012);
  camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.z=30;
  renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0xFDF8F0,0);

  // Ambient Light
  scene.add(new THREE.AmbientLight(0xFDF8F0,0.4));
  // Directional Light (golden sun)
  const dirLight=new THREE.DirectionalLight(0xF0C040,0.6);dirLight.position.set(10,15,8);scene.add(dirLight);
  // Moving Point Lights
  const pl1=new THREE.PointLight(0x52B788,0.8,50);pl1.position.set(-10,5,5);scene.add(pl1);threeObjects.push({mesh:pl1,type:'plight',offset:0});
  const pl2=new THREE.PointLight(0xD4A017,0.6,50);pl2.position.set(10,-5,5);scene.add(pl2);threeObjects.push({mesh:pl2,type:'plight',offset:Math.PI});

  // Coffee Beans - 15 spheres
  const beanMat=new THREE.MeshPhongMaterial({color:0x6B3A2A,shininess:60});
  for(let i=0;i<15;i++){
    const g=new THREE.SphereGeometry(0.3+Math.random()*0.4,12,12);
    g.scale(1,0.7,0.8);
    const m=new THREE.Mesh(g,beanMat);
    m.position.set((Math.random()-0.5)*40,(Math.random()-0.5)*30,(Math.random()-0.5)*20-5);
    scene.add(m);
    // Halo light for some
    if(i%4===0){const h=new THREE.PointLight(0x8B5E3C,0.3,6);m.add(h)}
    threeObjects.push({mesh:m,type:'bean',speed:0.002+Math.random()*0.004,floatSpeed:0.3+Math.random()*0.5,floatAmp:0.8+Math.random()*1.2,phase:Math.random()*Math.PI*2});
  }

  // Tea Leaves - 12 planes
  const leafMat=new THREE.MeshPhongMaterial({color:0x2D6A4F,side:THREE.DoubleSide,transparent:true,opacity:0.7});
  for(let i=0;i<12;i++){
    const g=new THREE.PlaneGeometry(0.8+Math.random()*0.6,0.25+Math.random()*0.15);
    const m=new THREE.Mesh(g,leafMat.clone());
    m.material.color.setHex(i%2===0?0x2D6A4F:0x52B788);
    m.position.set((Math.random()-0.5)*44,(Math.random()-0.5)*28,(Math.random()-0.5)*18-3);
    m.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    scene.add(m);
    threeObjects.push({mesh:m,type:'leaf',rx:0.003+Math.random()*0.005,ry:0.002+Math.random()*0.004,rz:0.001+Math.random()*0.003,phase:Math.random()*Math.PI*2});
  }

  // Basket Geometries - 8 TorusKnots
  const basketColors=[0x1A1A2E,0xFFFFFF,0xC8922A];
  for(let i=0;i<8;i++){
    const g=new THREE.TorusKnotGeometry(0.6+Math.random()*0.4,0.15,48,8,2,3);
    const solid=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:basketColors[i%3],transparent:true,opacity:0.5}));
    const wire=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:basketColors[(i+1)%3],wireframe:true,transparent:true,opacity:0.3}));
    solid.add(wire);
    solid.position.set((Math.random()-0.5)*50,(Math.random()-0.5)*32,(Math.random()-0.5)*15-8);
    scene.add(solid);
    threeObjects.push({mesh:solid,type:'basket',rx:0.002+Math.random()*0.003,ry:0.003+Math.random()*0.002,rz:0.001+Math.random()*0.002});
  }

  // Volcanic Rocks - 10 Dodecahedrons
  const rockMat=new THREE.MeshPhongMaterial({color:0x1A1A2E,flatShading:true});
  for(let i=0;i<10;i++){
    const g=new THREE.DodecahedronGeometry(0.4+Math.random()*0.5,0);
    const m=new THREE.Mesh(g,rockMat);
    m.position.set((Math.random()-0.5)*48,(Math.random()-0.5)*30,(Math.random()-0.5)*20-6);
    scene.add(m);
    threeObjects.push({mesh:m,type:'rock',rx:0.004+Math.random()*0.006,ry:0.003+Math.random()*0.005,phase:Math.random()*Math.PI*2});
  }

  // Gold Particles - 1500
  const partGeo=new THREE.BufferGeometry();
  const partCount=1500;const partPos=new Float32Array(partCount*3);
  for(let i=0;i<partCount;i++){partPos[i*3]=(Math.random()-0.5)*80;partPos[i*3+1]=(Math.random()-0.5)*60;partPos[i*3+2]=(Math.random()-0.5)*40-10}
  partGeo.setAttribute('position',new THREE.BufferAttribute(partPos,3));
  const partMat=new THREE.PointsMaterial({color:0xD4A017,size:0.08,transparent:true,opacity:0.3});
  const particles=new THREE.Points(partGeo,partMat);
  scene.add(particles);
  threeObjects.push({mesh:particles,type:'particles',positions:partPos,count:partCount});

  // Aurora Planes - 3
  for(let i=0;i<3;i++){
    const g=new THREE.PlaneGeometry(60,20,32,16);
    const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:i===0?0x1B4332:i===1?0x2D6A4F:0xD4A017,transparent:true,opacity:0.06+i*0.02,side:THREE.DoubleSide}));
    m.position.set(0,-8-i*5,-25-i*5);m.rotation.x=-0.3;
    scene.add(m);
    threeObjects.push({mesh:m,type:'aurora',geo:g,speed:0.5+i*0.3,amp:0.3+i*0.1});
  }

  animateThree();
}

function animateThree(){
  if(!heroVisible){requestAnimationFrame(animateThree);return}
  const t=performance.now()*0.001;

  // Background slow float
  camera.position.y+=(-scrollY*0.001-camera.position.y)*0.015;
  camera.lookAt(scene.position);

  threeObjects.forEach(o=>{

    if(o.type==='bean'){o.mesh.rotation.x+=o.speed;o.mesh.rotation.y+=o.speed*0.7;o.mesh.position.y+=Math.sin(t*o.floatSpeed+o.phase)*0.005*o.floatAmp}
    else if(o.type==='leaf'){o.mesh.rotation.x+=o.rx;o.mesh.rotation.y+=o.ry;o.mesh.rotation.z+=o.rz}
    else if(o.type==='basket'){o.mesh.rotation.x+=o.rx;o.mesh.rotation.y+=o.ry;o.mesh.rotation.z+=o.rz}
    else if(o.type==='rock'){o.mesh.rotation.x+=o.rx;o.mesh.rotation.y+=o.ry}
    else if(o.type==='plight'){o.mesh.position.x=Math.sin(t*0.5+o.offset)*12;o.mesh.position.y=Math.cos(t*0.3+o.offset)*8}
    else if(o.type==='particles'){
      const pos=o.mesh.geometry.attributes.position.array;
      for(let i=0;i<o.count;i++){pos[i*3+1]+=0.008;pos[i*3]+=Math.sin(t+i*0.01)*0.003;if(pos[i*3+1]>30)pos[i*3+1]=-30}
      o.mesh.geometry.attributes.position.needsUpdate=true;
    }
    else if(o.type==='aurora'){
      const pos=o.geo.attributes.position.array;
      for(let i=0;i<pos.length;i+=3){pos[i+2]=Math.sin(pos[i]*0.1+t*o.speed)*o.amp+Math.cos(pos[i+1]*0.1+t*o.speed*0.7)*o.amp*0.5}
      o.geo.attributes.position.needsUpdate=true;
    }
  });

  renderer.render(scene,camera);
  requestAnimationFrame(animateThree);
}

// Hero visibility observer
function initHeroObs(){
  new IntersectionObserver(([e])=>{heroVisible=e.isIntersecting},{threshold:0}).observe(document.getElementById('hero'));
}
</script>
